name: FastAPI CI/CD (Windows)

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: vivek342/fastapi-api

jobs:
  build-deploy:
    runs-on: self-hosted

    steps:
      # 🔹 Checkout source code
      - name: Checkout
        uses: actions/checkout@v3

      # 🔹 Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # 🔹 Generate short commit SHA tag
      - name: Set Image Tag
        shell: powershell
        run: |
          $tag = $env:GITHUB_SHA.Substring(0,7)
          echo "TAG=$tag" >> $env:GITHUB_ENV

      # 🔹 Build Docker image
      - name: Build Image
        shell: powershell
        run: docker build -t ${env:IMAGE_NAME}:${env:TAG} .

      # 🔹 Push Docker image
      - name: Push Image
        shell: powershell
        run: docker push ${env:IMAGE_NAME}:${env:TAG}

      # 🔹 Install kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      # 🔹 Configure kubeconfig (FIXED ✅)
      - name: Configure kubeconfig
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path $HOME\.kube
          "${{ secrets.KUBECONFIG }}" | Out-File -FilePath $HOME\.kube\config -Encoding ascii

      # 🔹 Verify cluster connectivity (IMPORTANT ✅)
      - name: Verify Cluster
        shell: powershell
        run: |
          kubectl cluster-info
          kubectl get nodes

      # 🔹 Deploy to Kubernetes
      - name: Deploy to Kubernetes
        shell: powershell
        run: |
          kubectl set image deployment/fastapi-deployment fastapi-container=${env:IMAGE_NAME}:${env:TAG}
          kubectl rollout status deployment/fastapi-deployment

      # 🔹 Optional: Rollback if deployment fails
      - name: Rollback on Failure
        if: failure()
        shell: powershell
        run: |
          kubectl rollout undo deployment/fastapi-deployment
