name: FastAPI CI/CD

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: vivek342/fastapi-api

jobs:
  build-deploy:
    runs-on: self-hosted

    steps:
      # 🔹 Checkout code
      - name: Checkout
        uses: actions/checkout@v3

      # 🔹 Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # 🔹 Set image tag using commit SHA
      - name: Set Image Tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # 🔹 Build Docker image
      - name: Build Image
        run: docker build -t $IMAGE_NAME:$TAG .

      # 🔹 Push Docker image
      - name: Push Image
        run: docker push $IMAGE_NAME:$TAG

      # 🔹 Setup kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      # 🔹 Configure kubeconfig securely
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

      # 🔹 Update deployment image (dynamic)
      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/fastapi-deployment fastapi-container=$IMAGE_NAME:$TAG
          kubectl rollout status deployment/fastapi-deployment
