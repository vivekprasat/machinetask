name: FastAPI CI/CD


on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: vivek342/fastapi-api

jobs:
  build-deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Docker Login
      run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

    - name: Build Image
      working-directory: "task1 docker builds"
      run: docker build -t $IMAGE_NAME:latest .

    - name: Push Image
      run: docker push $IMAGE_NAME:latest
  docker-composer-deploy:
     runs-on: self-hosted
     needs: build-deploy
     steps:
       - name: Run Docker Compose
         working-directory: "task2 dockercompose"
         run: |
            docker compose up -d --build
  kubernetes-deploy:
     runs-on: self-hosted
     needs: docker-composer-deploy
     
     steps:
       - name: Setup kubectl
         uses: azure/setup-kubectl@v3
       - name: Configure kubeconfig
         run: |
           mkdir -p $HOME/.kube
           echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 --decode > $HOME/.kube/config
           export KUBECONFIG=$HOME/.kube/config
       - name: Verify Cluster
         run: |
           kubectl config current-context
           kubectl get nodes
       - name: Secret Deployment
         working-directory: "task3 kubernetes"
         run: |
            kubectl apply -f secrets.yml
       - name: Config Deployment
         working-directory: "task3 kubernetes"
         run: |
            kubectl apply -f config.yml
       - name: Application Deployment
         working-directory: "task3 kubernetes"
         run: |
            kubectl apply -f deployments.yml
       - name: Horizontal Pod Autoscaler
         working-directory: "task3 kubernetes"
         run: |
            kubectl apply -f hpa.yml
       - name: Load Balancer Deployment
         working-directory: "task3 kubernetes"
         run: |
            kubectl apply -f LoadBalancer.yml
    
    
      
   
