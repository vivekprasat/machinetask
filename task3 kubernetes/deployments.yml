apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi-api
  template:
    metadata:
      labels:
        app: fastapi-api
    spec:
      containers:
      - name: fastapi-api
        image: vivek342/fastapi-api:latest
        ports:
          - containerPort: 8000
        envFrom:
          - configMapRef:
              name: fastapi-config
          - secretRef:
              name: fastapi-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "500m"

      - name: redis
        image: redis:7
        ports:
          - containerPort: 6379
        volumeMounts:
          - name: viveknew
            mountPath: /data

      volumes:
        - name: viveknew
          emptyDir: {}
